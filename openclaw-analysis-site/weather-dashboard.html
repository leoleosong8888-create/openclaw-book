<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 날씨 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121933;
      --text: #ecf2ff;
      --muted: #9fb3d9;
      --accent: #59c3ff;
      --accent2: #ff8fab;
      --accent3: #7bd389;
      --accent4: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Pretendard, "Noto Sans KR", system-ui, sans-serif;
      background: linear-gradient(180deg, #0a0f1f 0%, #0f1730 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 12px; font-size: 28px; }
    .sub { color: var(--muted); margin-bottom: 16px; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      background: rgba(18, 25, 51, 0.8);
      border: 1px solid rgba(120, 149, 214, 0.2);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
    }
    select, button {
      border: 1px solid rgba(140, 170, 240, 0.35);
      background: #0f1730;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
    }
    button { cursor: pointer; background: #1c2a57; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .card {
      background: rgba(18, 25, 51, 0.82);
      border: 1px solid rgba(120, 149, 214, 0.2);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .panel {
      background: rgba(18, 25, 51, 0.82);
      border: 1px solid rgba(120, 149, 214, 0.2);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 14px;
    }
    canvas { width: 100% !important; height: 320px !important; }
    .foot { color: var(--muted); font-size: 12px; margin-top: 8px; }
    .status { color: var(--accent4); font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🇰🇷 한국 날씨 대시보드</h1>
    <div class="sub">오늘 시간별 날씨 + 어제 동시간 온도 비교 (Open-Meteo)</div>

    <div class="controls">
      <label for="city">지역:</label>
      <select id="city">
        <option value="37.5665,126.9780">서울</option>
        <option value="35.1796,129.0756">부산</option>
        <option value="37.4563,126.7052">인천</option>
        <option value="35.8714,128.6014">대구</option>
        <option value="35.1595,126.8526">광주</option>
        <option value="36.3504,127.3845">대전</option>
        <option value="35.5384,129.3114">울산</option>
        <option value="33.4996,126.5312">제주</option>
      </select>
      <button id="reload">새로고침</button>
      <span id="status" class="status"></span>
    </div>

    <div class="cards" id="summary"></div>

    <div class="panel">
      <canvas id="tempChart"></canvas>
    </div>

    <div class="panel">
      <canvas id="rainWindChart"></canvas>
      <div class="foot">강수량은 막대(mm), 바람은 선(km/h)</div>
    </div>

    <div class="foot" id="meta"></div>
  </div>

  <script>
    const cityEl = document.getElementById('city');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const metaEl = document.getElementById('meta');

    let tempChart;
    let rainWindChart;

    function dateInTz(date, tz) {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz,
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(date);
      const get = (t) => parts.find((p) => p.type === t)?.value;
      return `${get('year')}-${get('month')}-${get('day')}`;
    }

    async function fetchWeather(lat, lon) {
      const tz = 'Asia/Seoul';
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,precipitation,wind_speed_10m&timezone=${encodeURIComponent(tz)}&past_days=1&forecast_days=1`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return { data: await r.json(), tz };
    }

    function buildSeries(data, tz) {
      const times = data.hourly.time;
      const t = data.hourly.temperature_2m;
      const f = data.hourly.apparent_temperature;
      const p = data.hourly.precipitation;
      const w = data.hourly.wind_speed_10m;
      const today = dateInTz(new Date(), tz);
      const dates = [...new Set(times.map(x => x.slice(0, 10)))].sort();
      const yesterday = dates.filter(d => d < today).at(-1) || dates[0];

      const byHourToday = {};
      const byHourYesterday = {};

      for (let i = 0; i < times.length; i++) {
        const d = times[i].slice(0, 10);
        const h = times[i].slice(11, 16);
        if (d === today) byHourToday[h] = { t: t[i], f: f[i], p: p[i], w: w[i] };
        if (d === yesterday) byHourYesterday[h] = t[i];
      }

      const labels = Object.keys(byHourToday).sort();
      return {
        labels,
        todayTemp: labels.map(h => byHourToday[h].t),
        feelsLike: labels.map(h => byHourToday[h].f),
        yesterdayTemp: labels.map(h => byHourYesterday[h] ?? null),
        rain: labels.map(h => byHourToday[h].p),
        wind: labels.map(h => byHourToday[h].w),
        today,
        yesterday,
      };
    }

    function drawSummary(s) {
      const avg = (arr) => arr.reduce((a,b)=>a+b,0)/arr.length;
      const max = Math.max(...s.todayTemp);
      const min = Math.min(...s.todayTemp);
      const rainSum = s.rain.reduce((a,b)=>a+b,0);
      const windAvg = avg(s.wind);
      const feelAvg = avg(s.feelsLike);

      summaryEl.innerHTML = `
        <div class="card"><div class="label">오늘 최고/최저</div><div class="value">${max.toFixed(1)}° / ${min.toFixed(1)}°</div></div>
        <div class="card"><div class="label">오늘 평균 체감</div><div class="value">${feelAvg.toFixed(1)}°C</div></div>
        <div class="card"><div class="label">오늘 누적 강수</div><div class="value">${rainSum.toFixed(1)} mm</div></div>
        <div class="card"><div class="label">평균 바람</div><div class="value">${windAvg.toFixed(1)} km/h</div></div>
      `;
    }

    function drawCharts(s) {
      if (tempChart) tempChart.destroy();
      if (rainWindChart) rainWindChart.destroy();

      tempChart = new Chart(document.getElementById('tempChart'), {
        type: 'line',
        data: {
          labels: s.labels,
          datasets: [
            { label: '오늘 온도', data: s.todayTemp, borderColor: '#59c3ff', backgroundColor: 'rgba(89,195,255,0.2)', tension: 0.3, pointRadius: 1.5 },
            { label: '체감온도', data: s.feelsLike, borderColor: '#7bd389', backgroundColor: 'rgba(123,211,137,0.18)', tension: 0.3, pointRadius: 1.5 },
            { label: '어제 온도', data: s.yesterdayTemp, borderColor: '#ff8fab', borderDash: [5,5], backgroundColor: 'rgba(255,143,171,0.15)', tension: 0.3, pointRadius: 1.5 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#ecf2ff' } }, title: { display: true, text: `온도 비교 (${s.today} vs ${s.yesterday})`, color: '#ecf2ff' } },
          scales: {
            x: { ticks: { color: '#c8d6f5' }, grid: { color: 'rgba(200,214,245,0.08)' } },
            y: { ticks: { color: '#c8d6f5' }, grid: { color: 'rgba(200,214,245,0.08)' } }
          }
        }
      });

      rainWindChart = new Chart(document.getElementById('rainWindChart'), {
        data: {
          labels: s.labels,
          datasets: [
            { type: 'bar', label: '강수량(mm)', data: s.rain, backgroundColor: 'rgba(255, 209, 102, 0.65)', yAxisID: 'y' },
            { type: 'line', label: '바람(km/h)', data: s.wind, borderColor: '#b28dff', backgroundColor: 'rgba(178,141,255,0.25)', tension: 0.3, pointRadius: 1.5, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#ecf2ff' } }, title: { display: true, text: '강수/바람', color: '#ecf2ff' } },
          scales: {
            x: { ticks: { color: '#c8d6f5' }, grid: { color: 'rgba(200,214,245,0.08)' } },
            y: { type: 'linear', position: 'left', ticks: { color: '#ffd166' }, grid: { color: 'rgba(200,214,245,0.08)' } },
            y1: { type: 'linear', position: 'right', ticks: { color: '#b28dff' }, grid: { drawOnChartArea: false } }
          }
        }
      });
    }

    async function load() {
      try {
        statusEl.textContent = '데이터 불러오는 중...';
        const [lat, lon] = cityEl.value.split(',').map(Number);
        const city = cityEl.options[cityEl.selectedIndex].text;
        const { data, tz } = await fetchWeather(lat, lon);
        const s = buildSeries(data, tz);
        drawSummary(s);
        drawCharts(s);
        metaEl.textContent = `지역: ${city} | 시간대: ${tz} | 데이터 출처: Open-Meteo`;
        statusEl.textContent = '업데이트 완료';
      } catch (e) {
        console.error(e);
        statusEl.textContent = `조회 실패: ${e.message}`;
      }
    }

    document.getElementById('reload').addEventListener('click', load);
    cityEl.addEventListener('change', load);
    load();
  </script>
</body>
</html>
