<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 날씨 그래프</title>
  <!-- Chart.js: GitHub stars 많고(대표적) 사용량이 큰 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0b1020; --card:#121933; --text:#ecf2ff; --muted:#9fb3d9; --err:#ffb4b4; }
    body { margin:0; font-family:Pretendard,"Noto Sans KR",sans-serif; background:linear-gradient(180deg,#0a0f1f,#0f1730); color:var(--text); }
    .wrap { max-width:1100px; margin:0 auto; padding:20px; }
    .controls,.panel,.card,.error { background:rgba(18,25,51,.82); border:1px solid rgba(120,149,214,.2); border-radius:12px; }
    .controls { padding:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    select,button { border:1px solid rgba(140,170,240,.35); background:#0f1730; color:var(--text); border-radius:10px; padding:8px 10px; }
    button { cursor:pointer; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-bottom:12px; }
    .card { padding:10px 12px; }
    .label { color:var(--muted); font-size:12px; }
    .value { font-size:20px; font-weight:700; margin-top:4px; }
    .panel { padding:10px; margin-bottom:12px; }
    canvas { width:100% !important; height:320px !important; }
    .muted { color:var(--muted); font-size:12px; }
    .error { padding:10px 12px; color:var(--err); display:none; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📊 한국 날씨 그래프</h1>
    <p class="muted">오늘 시간별 + 어제 동일 시간 온도 비교 (Open-Meteo)</p>

    <div class="controls">
      <label for="city">지역</label>
      <select id="city">
        <option value="37.5665,126.9780">서울</option>
        <option value="35.1796,129.0756">부산</option>
        <option value="37.4563,126.7052">인천</option>
        <option value="35.8714,128.6014">대구</option>
        <option value="35.1595,126.8526">광주</option>
        <option value="36.3504,127.3845">대전</option>
        <option value="35.5384,129.3114">울산</option>
        <option value="33.4996,126.5312">제주</option>
      </select>
      <button id="reload">새로고침</button>
      <span id="status" class="muted"></span>
    </div>

    <div id="errorBox" class="error"></div>
    <div class="cards" id="summary"></div>
    <div class="panel"><canvas id="tempChart"></canvas></div>
    <div class="panel"><canvas id="rainWindChart"></canvas></div>
    <div class="panel" id="tablePanel" style="overflow:auto;"></div>
    <p class="muted" id="meta"></p>
  </div>

  <script>
    var cityEl = document.getElementById('city');
    var statusEl = document.getElementById('status');
    var summaryEl = document.getElementById('summary');
    var metaEl = document.getElementById('meta');
    var errorBox = document.getElementById('errorBox');
    var tablePanel = document.getElementById('tablePanel');
    var tempChart = null;
    var rainWindChart = null;

    // 네트워크 실패 시에도 "차트가 비어보이는" 문제를 피하기 위한 fallback 데이터
    var FALLBACK_SERIES = {
      labels: ["00:00","03:00","06:00","09:00","12:00","15:00","18:00","21:00"],
      todayTemp: [3.4,2.8,2.1,4.2,7.3,8.9,6.2,4.1],
      feels: [0.2,-0.1,-0.8,1.0,4.3,5.8,3.0,1.2],
      yesterdayTemp: [4.1,3.6,3.0,5.0,8.1,9.2,7.0,5.4],
      rain: [0.0,0.0,0.4,0.8,0.2,0.0,0.1,0.0],
      wind: [9.2,8.1,10.0,12.5,11.4,10.1,9.8,8.7],
      today: "(fallback)",
      yesterday: "(fallback)"
    };

    function dateInTz(date, tz) {
      var parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(date);
      function g(type) {
        for (var i = 0; i < parts.length; i++) if (parts[i].type === type) return parts[i].value;
        return '';
      }
      return g('year') + '-' + g('month') + '-' + g('day');
    }

    async function fetchWeather(lat, lon) {
      var tz = 'Asia/Seoul';
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
        '&hourly=temperature_2m,apparent_temperature,precipitation,wind_speed_10m&timezone=' +
        encodeURIComponent(tz) + '&past_days=1&forecast_days=1';

      var r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return { data: await r.json(), tz: tz };
    }

    function makeSeries(data, tz) {
      if (!data || !data.hourly || !data.hourly.time) throw new Error('hourly 데이터 없음');

      var time = data.hourly.time;
      var t = data.hourly.temperature_2m;
      var f = data.hourly.apparent_temperature;
      var p = data.hourly.precipitation;
      var w = data.hourly.wind_speed_10m;

      var today = dateInTz(new Date(), tz);
      var uniq = {};
      for (var i = 0; i < time.length; i++) uniq[time[i].slice(0, 10)] = true;
      var dates = Object.keys(uniq).sort();

      var yesterday = dates[0];
      for (var d = 0; d < dates.length; d++) {
        if (dates[d] < today) yesterday = dates[d];
      }

      var td = {};
      var yd = {};
      for (var j = 0; j < time.length; j++) {
        var day = time[j].slice(0, 10);
        var hh = time[j].slice(11, 16);
        if (day === today) td[hh] = { t: t[j], f: f[j], p: p[j], w: w[j] };
        if (day === yesterday) yd[hh] = t[j];
      }

      var labels = Object.keys(td).sort();
      if (!labels.length) throw new Error('오늘 데이터가 비어있음');

      var out = { labels: labels, todayTemp: [], feels: [], yesterdayTemp: [], rain: [], wind: [], today: today, yesterday: yesterday };
      for (var k = 0; k < labels.length; k++) {
        var h = labels[k];
        out.todayTemp.push(td[h].t);
        out.feels.push(td[h].f);
        out.yesterdayTemp.push(typeof yd[h] === 'number' ? yd[h] : null);
        out.rain.push(td[h].p);
        out.wind.push(td[h].w);
      }
      return out;
    }

    function avg(arr) {
      if (!arr || !arr.length) return 0;
      var sum = 0;
      for (var i = 0; i < arr.length; i++) sum += arr[i];
      return sum / arr.length;
    }

    function drawSummary(s) {
      var max = Math.max.apply(null, s.todayTemp);
      var min = Math.min.apply(null, s.todayTemp);
      var rainSum = 0;
      for (var i = 0; i < s.rain.length; i++) rainSum += s.rain[i];

      summaryEl.innerHTML =
        "<div class='card'><div class='label'>최고/최저</div><div class='value'>" + max.toFixed(1) + "° / " + min.toFixed(1) + "°</div></div>" +
        "<div class='card'><div class='label'>평균 체감</div><div class='value'>" + avg(s.feels).toFixed(1) + "°C</div></div>" +
        "<div class='card'><div class='label'>누적 강수</div><div class='value'>" + rainSum.toFixed(1) + " mm</div></div>" +
        "<div class='card'><div class='label'>평균 바람</div><div class='value'>" + avg(s.wind).toFixed(1) + " km/h</div></div>";
    }

    function drawCharts(s) {
      if (typeof Chart === 'undefined') return false;
      if (tempChart) tempChart.destroy();
      if (rainWindChart) rainWindChart.destroy();

      tempChart = new Chart(document.getElementById('tempChart'), {
        type: 'line',
        data: {
          labels: s.labels,
          datasets: [
            { label: '오늘 온도', data: s.todayTemp, borderColor: '#59c3ff', tension: 0.3, pointRadius: 1.5 },
            { label: '체감온도', data: s.feels, borderColor: '#7bd389', tension: 0.3, pointRadius: 1.5 },
            { label: '어제 온도', data: s.yesterdayTemp, borderColor: '#ff8fab', borderDash: [5, 5], tension: 0.3, pointRadius: 1.5 }
          ]
        }
      });

      rainWindChart = new Chart(document.getElementById('rainWindChart'), {
        data: {
          labels: s.labels,
          datasets: [
            { type: 'bar', label: '강수(mm)', data: s.rain, backgroundColor: 'rgba(255,209,102,.65)', yAxisID: 'y' },
            { type: 'line', label: '바람(km/h)', data: s.wind, borderColor: '#b28dff', tension: 0.3, pointRadius: 1.5, yAxisID: 'y1' }
          ]
        },
        options: {
          scales: {
            y: { type: 'linear', position: 'left' },
            y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false } }
          }
        }
      });
      return true;
    }

    function renderTable(s) {
      var html = "<table style='width:100%;border-collapse:collapse;font-size:13px'>" +
        "<thead><tr>" +
        "<th style='text-align:left;padding:6px;border-bottom:1px solid #334'>시간</th>" +
        "<th style='text-align:right;padding:6px;border-bottom:1px solid #334'>온도</th>" +
        "<th style='text-align:right;padding:6px;border-bottom:1px solid #334'>체감</th>" +
        "<th style='text-align:right;padding:6px;border-bottom:1px solid #334'>강수(mm)</th>" +
        "<th style='text-align:right;padding:6px;border-bottom:1px solid #334'>바람(km/h)</th>" +
        "<th style='text-align:right;padding:6px;border-bottom:1px solid #334'>어제온도</th>" +
        "</tr></thead><tbody>";
      for (var i = 0; i < s.labels.length; i++) {
        html += "<tr>" +
          "<td style='padding:6px;border-bottom:1px solid #223'>" + s.labels[i] + "</td>" +
          "<td style='padding:6px;border-bottom:1px solid #223;text-align:right'>" + s.todayTemp[i].toFixed(1) + "</td>" +
          "<td style='padding:6px;border-bottom:1px solid #223;text-align:right'>" + s.feels[i].toFixed(1) + "</td>" +
          "<td style='padding:6px;border-bottom:1px solid #223;text-align:right'>" + s.rain[i].toFixed(1) + "</td>" +
          "<td style='padding:6px;border-bottom:1px solid #223;text-align:right'>" + s.wind[i].toFixed(1) + "</td>" +
          "<td style='padding:6px;border-bottom:1px solid #223;text-align:right'>" + (s.yesterdayTemp[i] == null ? '-' : s.yesterdayTemp[i].toFixed(1)) + "</td>" +
          "</tr>";
      }
      html += "</tbody></table>";
      tablePanel.innerHTML = html;
    }

    function showError(msg) {
      errorBox.style.display = 'block';
      errorBox.textContent = msg;
    }

    function hideError() {
      errorBox.style.display = 'none';
      errorBox.textContent = '';
    }

    async function load() {
      try {
        hideError();
        statusEl.textContent = '조회 중...';
        var vals = cityEl.value.split(',');
        var lat = Number(vals[0]);
        var lon = Number(vals[1]);
        var city = cityEl.options[cityEl.selectedIndex].text;

        var fetched = await fetchWeather(lat, lon);
        var s = makeSeries(fetched.data, fetched.tz);
        drawSummary(s);
        var chartOk = drawCharts(s);
        renderTable(s);

        if (!chartOk) showError('차트 라이브러리 로딩 실패: 표 데이터로 대체 표시 중');
        metaEl.textContent = '지역: ' + city + ' | 시간대: ' + fetched.tz + ' | 출처: Open-Meteo';
        statusEl.textContent = '완료';
      } catch (e) {
        // 장애 상황에서도 사용자에게 그래프를 보여주기 위해 fallback 표시
        drawSummary(FALLBACK_SERIES);
        drawCharts(FALLBACK_SERIES);
        renderTable(FALLBACK_SERIES);
        metaEl.textContent = '출처: fallback 샘플 데이터';
        statusEl.textContent = '네트워크 실패로 fallback 표시';
        showError('실시간 데이터 조회 실패: ' + (e && e.message ? e.message : e));
      }
    }

    document.getElementById('reload').addEventListener('click', load);
    cityEl.addEventListener('change', load);
    load();
  </script>
</body>
</html>
